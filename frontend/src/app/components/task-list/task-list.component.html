<section class="list-card">

  <div class="list-header">
    <h3 class="section-title">📝 Task List</h3>
    <span class="task-count">{{ filteredTasks.length }} task(s)</span>
  </div>

  <div class="controls">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" [(ngModel)]="searchQuery" placeholder="Search tasks..." />
    </div>

    <div class="filter-buttons">
      <button
        *ngFor="let f of ['ALL', 'PENDING', 'COMPLETED']"
        class="filter-btn"
        [class.active]="statusFilter === f"
        (click)="statusFilter = $any(f)">
        {{ f }}
      </button>
    </div>
  </div>

  <div *ngIf="isLoading" class="loading">Loading tasks...</div>

  <div *ngIf="!isLoading && filteredTasks.length === 0" class="empty-state">
    <p>No tasks found. Create one above!</p>
  </div>

  <div *ngIf="!isLoading && filteredTasks.length > 0" class="table-wrapper">
    <table class="task-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Task Name</th>
          <th>Description</th>
          <th>Status</th>
          <th>Created Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let task of filteredTasks; let i = index">
          <td data-label="#">{{ i + 1 }}</td>
          <td data-label="Task Name">{{ task.name }}</td>
          <td data-label="Description">{{ task.description || '—' }}</td>
          <td data-label="Status">
            <span class="status-badge"
              [class.badge-pending]="task.status === 'PENDING'"
              [class.badge-completed]="task.status === 'COMPLETED'">
              {{ task.status }}
            </span>
          </td>
          <td data-label="Created Date">{{ formatDate(task.createdDate) }}</td>
          <td data-label="Actions" class="actions">
            <button *ngIf="task.status === 'PENDING'" class="btn-action complete" (click)="onMarkCompleted(task.id)">
              ✔ Complete
            </button>
            <button class="btn-action delete" (click)="onDelete(task.id)">
              🗑 Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</section>
