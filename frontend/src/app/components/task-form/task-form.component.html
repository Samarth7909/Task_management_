<section class="form-card">
  <h3 class="section-title">➕ Create New Task</h3>

  <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" novalidate>

    <div class="form-group">
      <label for="name">Task Name <span class="required">*</span></label>
      <input
        id="name"
        type="text"
        formControlName="name"
        placeholder="Enter task name..."
        [class.invalid]="nameControl.invalid && nameControl.touched"
      />
      <div class="error-msg" *ngIf="nameControl.touched && nameControl.errors?.['required']">
        Task name is mandatory.
      </div>
      <div class="error-msg" *ngIf="nameControl.touched && nameControl.errors?.['maxlength']">
        Must not exceed 100 characters.
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea
        id="description"
        formControlName="description"
        placeholder="Optional description..."
        rows="3"
        [class.invalid]="descriptionControl.invalid && descriptionControl.touched"
      ></textarea>
      <div class="error-msg" *ngIf="descriptionControl.touched && descriptionControl.errors?.['maxlength']">
        Must not exceed 500 characters.
      </div>
      <div class="char-count">{{ (descriptionControl.value?.length || 0) }} / 500</div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Create Task</button>
      <button type="button" class="btn btn-secondary" (click)="onReset()">Reset</button>
    </div>

  </form>
</section>
